name: release-ofuscada

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm --prefix OFUSCAMENTO install

      - name: Build
        run: npm --prefix OFUSCAMENTO run build
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Obfuscate
        run: npm --prefix OFUSCAMENTO run obfuscate

      - name: Publicar assets na branch main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git checkout -B main origin/main
          cp OFUSCAMENTO/dist/HOC_NOC.release.obf.lua HOC_NOC.release.obf.lua
          cp OFUSCAMENTO/dist/Loader.release.lua Loader.release.lua
          git add HOC_NOC.release.obf.lua Loader.release.lua
          git diff --staged --quiet || git commit -m "release: ${{ github.ref_name }}"
          git push origin main

      - name: Mirror repositório externo
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ secrets.MIRROR_REPO }}
          MIRROR_BRANCH: ${{ secrets.MIRROR_BRANCH }}
        run: npm --prefix OFUSCAMENTO run mirror

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OFUSCAMENTO/dist/HOC_NOC.release.obf.lua
            OFUSCAMENTO/dist/Loader.release.lua
          fail_on_unmatched_files: false
